<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floral Planner</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
</head>

<body class="pink-theme">

<div class="container">

<h1>Task Calender</h1>

<div class="theme-switcher">
<button onclick="setTheme('pink-theme')">🌷 Floral</button>
<button onclick="setTheme('lavender-theme')">🍀 Nature</button>
<button onclick="setTheme('anime-theme')">🎌 Anime</button>
<button onclick="setTheme('dark-theme')">🌙 Space</button>
</div>

<div class="calendar">

<div class="month">
<button id="prev">◀</button>
<h2 id="monthYear"></h2>
<button id="next">▶</button>
</div>


<!-- Days of week -->
<div class="weekdays">
<div>Sun</div>
<div>Mon</div>
<div>Tue</div>
<div>Wed</div>
<div>Thu</div>
<div>Fri</div>
<div>Sat</div>
</div>



<div class="days" id="calendarDays"></div>

</div>

<div class="todo">

<h2>✨ To-Do List</h2>

<input type="text" id="taskInput" placeholder="Enter your task">

<input type="time" id="taskTime">

<button onclick="addTask()">Add Task</button>

<ul id="taskList"></ul>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
